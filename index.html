<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sci Calc">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1B4332">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Sci Calc</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--teal:#2D6A4F;--teal-hdr:#2D6A4F;--teal-sb:#3a7d5e;--bg:#FFFFFF;--white:#F5F5F0;--g1:#E0E0E0;--g2:#CACACA;--txt:#1A1A1A;--hh:26px;--brad:10px;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--teal-hdr);font-family:'Roboto',sans-serif;}
    /* TOP BAR: extends behind iOS status bar */
    #hdr{position:fixed;top:0;left:0;right:0;height:calc(var(--hh) + env(safe-area-inset-top));background:var(--teal-hdr);display:flex;align-items:flex-end;padding:0 10px calc(4px);z-index:100;}
    #hdr-title{color:white;font-size:13px;font-weight:500;letter-spacing:.3px;padding-bottom:2px;}
    #htimer{color:white;font-size:13px;font-family:'Roboto',sans-serif;font-weight:400;letter-spacing:1px;position:absolute;left:50%;bottom:4px;transform:translateX(-50%);display:none;}
    .hb{background:none;border:none;color:white;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;padding:4px;}
    .hb:active{background:rgba(255,255,255,.2);}
    #app{position:fixed;top:calc(var(--hh) + env(safe-area-inset-top));left:0;right:0;bottom:env(safe-area-inset-bottom);display:flex;flex-direction:column;background:#fff;}
    #top{display:flex;flex-direction:row;flex:1;min-height:0;background:#fff;}
    /* SIDEBAR: slightly lighter than header */
    #sb{width:72px;background:var(--teal-sb);display:flex;flex-direction:column;align-items:center;padding-top:4px;gap:0;flex-shrink:0;}
    #sb-ham{width:100%;height:34px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:2px;}
    #sb-ham:active{background:rgba(255,255,255,.15);}
    .sbb{width:66px;height:64px;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:8px;}
    .sbb:active,.sbb.on{background:rgba(255,255,255,.18);}
    .sbb svg{width:28px;height:28px;}
    .sbb span{font-size:11px;font-weight:400;color:rgba(255,255,255,.75);}
    .sbb.on span{color:white;font-weight:500;}
    /* DISPLAY area — white gap all around */
    #disp{flex:1;display:flex;flex-direction:column;background:#FAFAF8;margin:14px 14px 10px 12px;border:1px solid #D5D5D0;border-radius:8px;overflow:hidden;position:relative;min-width:0;}
    /* Gear icon inside display top-right */
    #gear-btn{position:absolute;top:6px;right:8px;background:none;border:none;cursor:pointer;padding:4px;z-index:10;}
    #gear-btn:active{opacity:.6;}

    /* Current input area */
    #cw{border-bottom:1px solid #EBEBEB;padding:8px 14px 8px;flex-shrink:0;min-height:70px;}
    #cn-row{margin-bottom:0;}
    #cn{font-size:13px;color:#888;font-family:'Roboto',sans-serif;font-weight:400;margin-bottom:0px;}
    #cn-ph{font-size:22px;color:#AAA;font-family:'Roboto',sans-serif;font-weight:300;margin-top:2px;padding-left:16px;}
    /* The rendered expression */
    #expr-line{font-size:24px;color:var(--txt);font-family:'Roboto Mono';min-height:36px;display:flex;align-items:center;flex-wrap:wrap;gap:0;line-height:1.3;}
    #cprev{font-size:13px;color:#999;font-family:'Roboto Mono';min-height:18px;margin-top:4px;}
    .ph{color:#AAA;font-style:normal;font-family:'Roboto',sans-serif;font-size:20px;font-weight:400;}
    /* warn icon */
    .warn{color:#F9A825;margin-right:6px;font-size:16px;}

    /* Expression rendering components */
    .er-text{display:inline;}
    .er-sup{display:inline-flex;align-items:flex-start;}
    .er-sup .base{display:inline;}
    .er-sup .exp{font-size:0.6em;vertical-align:super;display:inline-flex;align-items:center;color:var(--txt);}
    .er-sup .exp.editing{background:#E3F2FD;border-radius:3px;padding:0 2px;min-width:8px;}
    .er-sqrt{display:inline-flex;align-items:center;vertical-align:middle;}
    .er-sqrt .radicand{border-top:2px solid var(--txt);padding:0 2px;min-width:10px;}
    .er-frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;font-size:0.82em;line-height:1.2;}
    .er-frac .fnum{border-bottom:1.5px solid var(--txt);padding:0 4px;min-width:14px;text-align:center;min-height:1em;}
    .er-frac .fden{padding:0 4px;min-width:14px;text-align:center;min-height:1em;}
    .er-frac .fnum.act,.er-frac .fden.act{background:#E3F2FD;border-radius:3px;}

    /* Cursor blink */
    .cur{display:inline-block;width:2px;height:1.1em;background:var(--teal);margin:0 1px;animation:bl 1s step-end infinite;vertical-align:text-bottom;}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

    /* History */
    #hist{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:12px;justify-content:flex-start;}
    .ent{display:flex;flex-direction:column;gap:2px;}
    .en{font-size:11px;color:#999;font-family:'Roboto Mono';}
    .ee{font-size:20px;color:var(--txt);font-family:'Roboto Mono';line-height:1.4;word-break:break-all;display:flex;flex-wrap:wrap;align-items:center;}
    .er{font-size:15px;color:#666;font-family:'Roboto Mono';display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
    .ereq{color:var(--teal);font-weight:500;}
    /* history frac */
    .hfrac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-size:.82em;line-height:1.2;margin:0 2px;}
    .hfrac .fn{border-bottom:1.5px solid currentColor;padding:0 3px;}
    .hfrac .fd{padding:0 3px;}
    /* history sqrt */
    .hsqrt{display:inline-flex;align-items:center;vertical-align:middle;}
    .hsqrt .rad{border-top:2px solid currentColor;padding:0 2px;}

    #cvtb{position:absolute;bottom:8px;right:8px;width:36px;height:36px;background:#3949AB;border:none;border-radius:5px;color:white;font-size:13px;font-style:italic;font-weight:600;cursor:pointer;display:none;align-items:center;justify-content:center;}
    #cvtb.v{display:flex;}

    /* KEYBOARD */
    #kp{width:100%;flex-shrink:0;background:var(--bg);padding:5px 5px 6px;}
    #mtabs{display:flex;align-items:center;gap:0;padding:0 2px 5px;}
    .mt{background:none;border:none;font-size:15px;font-family:'Roboto';font-weight:400;color:#555;padding:4px 14px;border-radius:20px;cursor:pointer;}
    .mt.on{background:#7C4DFF;color:white;font-weight:500;}
    .mt:active{opacity:.7;}
    .kr{display:flex;gap:5px;margin-bottom:5px;}
    .kr:last-child{margin-bottom:0;}
    .k{flex:1;border:none;border-radius:var(--brad);cursor:pointer;height:46px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Roboto';font-size:16px;color:var(--txt);
      background:var(--white);box-shadow:0 1px 0 rgba(0,0,0,.2);
      transition:filter .08s;min-width:0;}
    .k:active{filter:brightness(.84);}
    .kn{background:var(--white);font-size:20px;}
    .ko{background:var(--g1);font-size:17px;}
    .kf{background:var(--white);font-size:14px;}
    .kd{background:var(--g2);font-size:14px;}
    .kgap{width:10px;flex:none;}
    .k sup{font-size:9px;vertical-align:super;}
    .k sub{font-size:9px;vertical-align:sub;}

    /* Overlays */
    .ov{position:fixed;inset:0;z-index:200;display:none;}
    .ov.on{display:block;}
    .ovbg{position:absolute;inset:0;background:rgba(0,0,0,.28);}
    #mbox{position:absolute;top:var(--hh);left:0;width:230px;background:white;box-shadow:2px 2px 10px rgba(0,0,0,.18);border-radius:0 0 4px 0;overflow:hidden;}
    .mhd{background:var(--teal);padding:10px 14px;}
    .mhd .ms{font-size:12px;color:rgba(255,255,255,.8);}
    .mr{padding:13px 16px;font-size:14px;color:var(--txt);display:flex;align-items:center;gap:12px;border-bottom:1px solid #F0F0F0;cursor:pointer;}
    .mr:active{background:#F5F5F5;}
    .mi{color:#888;width:22px;text-align:center;}
    #sets{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column;}
    #sets.on{display:flex;}
    #sethd{height:var(--hh);background:var(--teal);display:flex;align-items:center;padding:0 8px;gap:6px;}
    #sethd .st{color:white;font-size:14px;font-weight:500;}
    .ssec{padding:14px 16px 6px;font-size:11px;color:var(--teal);font-weight:600;text-transform:uppercase;}
    .srow{background:white;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0F0F0;cursor:pointer;}
    .sl{font-size:14px;color:var(--txt);}
    .sv{font-size:13px;color:#888;}
    #decp{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.35);display:none;align-items:flex-start;padding-top:50px;padding-left:14px;}
    #decp.on{display:flex;}
    #decl{background:white;border-radius:4px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.25);min-width:230px;max-height:400px;overflow-y:auto;}
    .do{padding:13px 18px;font-size:14px;color:var(--txt);border-bottom:1px solid #F0F0F0;cursor:pointer;}
    .do.sel{color:var(--teal);font-weight:500;background:#E8F5E9;}
    #exam{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;}
    #exam.on{display:flex;}
    #ec{background:white;border-radius:12px;overflow:hidden;width:400px;box-shadow:0 8px 30px rgba(0,0,0,.3);}
    .echd{background:var(--teal);padding:16px 20px 18px;}
    .echd .es{font-size:13px;color:rgba(255,255,255,.85);font-weight:400;margin-bottom:4px;}
    .echd .et{font-size:26px;font-weight:400;color:white;font-family:'Roboto',sans-serif;}
    .ecb{padding:18px 20px 6px;}
    .ecshow{font-size:15px;color:#333;margin-bottom:18px;}
    .ecr{margin-bottom:16px;}
    .ecr .rl{font-size:13px;color:#888;font-weight:400;margin-bottom:2px;}
    .ecr .rv{font-size:20px;color:#111;font-family:'Roboto',sans-serif;font-weight:400;}
    .ecf{padding:10px 20px 18px;display:flex;justify-content:flex-end;}
    #eeb{background:#7C4DFF;color:white;border:none;border-radius:6px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.8px;}
  </style>
</head>
<body>
<div id="hdr">
  <div id="hdr-title">Sci Calc</div>
  <div id="htimer">00:00</div>
</div>

<div id="app">
  <div id="top">
    <div id="sb">
      <!-- Hamburger / menu button -->
      <button id="sb-ham">
        <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <!-- Algebra -->
      <button class="sbb on" id="sba">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
          <rect x="6" y="6" width="5" height="3" rx="1" fill="white"/>
          <rect x="6" y="11" width="3" height="3" rx="1" fill="white"/>
          <rect x="10.5" y="11" width="3" height="3" rx="1" fill="white"/>
          <rect x="15" y="11" width="3" height="3" rx="1" fill="white"/>
          <rect x="6" y="15" width="3" height="3" rx="1" fill="white"/>
          <rect x="10.5" y="15" width="3" height="3" rx="1" fill="white"/>
          <rect x="15" y="15" width="3" height="3" rx="1" fill="white"/>
        </svg>
        <span style="color:white;font-weight:500">Algebra</span>
      </button>
      <!-- Tabelle -->
      <button class="sbb" id="sbt">
        <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)" width="28" height="28"><path d="M20 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 2v3H5V5h15zm-10 5h-5v-2h5v2zm0 4h-5v-2h5v2zm0 4h-5v-2h5v2zm5-8h5v2h-5v-2zm0 4h5v2h-5v-2zm0 4h5v2h-5v-2z"/></svg>
        <span>Tabelle</span>
      </button>
    </div>
    <div id="disp">
      <!-- Gear top-right inside display -->
      <button id="gear-btn">
        <svg viewBox="0 0 24 24" fill="#555" width="20" height="20"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <div id="cw">
        <div id="cn-row">
          <div id="cn">1)</div>
        </div>
        <div id="expr-line"></div>
        <div id="cprev"></div>
      </div>
      <div id="hist"></div>
      <button id="cvtb">u</button>
    </div>
  </div>

  <div id="kp">
    <div id="mtabs">
      <button class="mt on" data-m="m123">123</button>
      <button class="mt" data-m="mfx">f(x)</button>
      <button class="mt" data-m="mabc">ABC</button>
    </div>

    <!-- 123 keyboard — pixel perfect from images -->
    <div id="m123">
      <div class="kr">
        <!-- □² -->
        <button class="k kf" data-a="sq">
          <span style="display:inline-flex;align-items:flex-start;font-size:16px;">□<sup style="font-size:10px;line-height:1">2</sup></span>
        </button>
        <!-- □ⁿ -->
        <button class="k kf" data-a="pow">
          <span style="display:inline-flex;align-items:flex-start;font-size:16px;">□<sup style="font-size:10px;line-height:1">n</sup></span>
        </button>
        <!-- □⁻¹ -->
        <button class="k kf" data-a="inv">
          <span style="display:inline-flex;align-items:flex-start;font-size:16px;">□<sup style="font-size:10px;line-height:1">-1</sup></span>
        </button>
        <!-- √□ -->
        <button class="k kf" data-a="sqrt">
          <svg width="28" height="22" viewBox="0 0 28 22" fill="none">
            <polyline points="1,13 5,13 9,19 13,3" stroke="#444" stroke-width="1.7" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
            <line x1="13" y1="3" x2="27" y2="3" stroke="#444" stroke-width="1.7"/>
            <rect x="16" y="6" width="8" height="8" rx="1.5" stroke="#999" stroke-width="1.2" stroke-dasharray="2 1.5" fill="none"/>
          </svg>
        </button>
        <div class="kgap"></div>
        <button class="k kn" data-v="7">7</button>
        <button class="k kn" data-v="8">8</button>
        <button class="k kn" data-v="9">9</button>
        <button class="k ko" data-v="×">×</button>
        <button class="k ko" data-v="÷">÷</button>
      </div>
      <div class="kr">
        <button class="k kf" data-a="sin">sin</button>
        <button class="k kf" data-a="cos">cos</button>
        <button class="k kf" data-a="tan">tan</button>
        <button class="k kf" data-v="π">π</button>
        <div class="kgap"></div>
        <button class="k kn" data-v="4">4</button>
        <button class="k kn" data-v="5">5</button>
        <button class="k kn" data-v="6">6</button>
        <button class="k ko" data-v="+">+</button>
        <button class="k ko" data-v="−">−</button>
      </div>
      <div class="kr">
        <button class="k kf" data-a="ln">ln</button>
        <button class="k kf" data-a="log">log<sub>10</sub></button>
        <!-- matrix grid icon -->
        <button class="k kf" data-a="noop">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <line x1="7" y1="1" x2="7" y2="19" stroke="#555" stroke-width="1.3"/>
            <line x1="13" y1="1" x2="13" y2="19" stroke="#555" stroke-width="1.3"/>
            <line x1="1" y1="7" x2="19" y2="7" stroke="#555" stroke-width="1.3"/>
            <line x1="1" y1="13" x2="19" y2="13" stroke="#555" stroke-width="1.3"/>
            <rect x="1" y="1" width="18" height="18" rx="2" stroke="#555" stroke-width="1.3"/>
          </svg>
        </button>
        <!-- approx / mixed frac icon -->
        <button class="k kf" data-a="noop">
          <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
            <rect x="1" y="2" width="6" height="6" rx="1" stroke="#999" stroke-width="1.2" stroke-dasharray="2 1.3" fill="none"/>
            <rect x="9" y="2" width="6" height="6" rx="1" stroke="#999" stroke-width="1.2" stroke-dasharray="2 1.3" fill="none"/>
            <text x="16.5" y="8.5" font-size="7.5" fill="#555" font-family="Roboto" font-weight="500">-1</text>
          </svg>
        </button>
        <div class="kgap"></div>
        <button class="k kn" data-v="1">1</button>
        <button class="k kn" data-v="2">2</button>
        <button class="k kn" data-v="3">3</button>
        <!-- small grid/matrix grey -->
        <button class="k kd" data-a="noop">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
            <rect x="1" y="1" width="18" height="16" rx="2" stroke="#888" stroke-width="1.2"/>
            <line x1="7" y1="1" x2="7" y2="17" stroke="#888" stroke-width="1"/>
            <line x1="13" y1="1" x2="13" y2="17" stroke="#888" stroke-width="1"/>
            <line x1="1" y1="6.5" x2="19" y2="6.5" stroke="#888" stroke-width="1"/>
            <line x1="1" y1="11.5" x2="19" y2="11.5" stroke="#888" stroke-width="1"/>
          </svg>
        </button>
        <button class="k kd" data-a="del">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
            <path d="M8 2H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H8L2 8z" stroke="#555" stroke-width="1.5" fill="none"/>
            <line x1="10.5" y1="5.5" x2="16.5" y2="10.5" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="16.5" y1="5.5" x2="10.5" y2="10.5" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="kr">
        <button class="k kd" data-a="ans" style="font-size:14px;font-weight:500;">ans</button>
        <button class="k kd" data-v=",">,</button>
        <button class="k kd" data-a="lparen">(</button>
        <button class="k kd" data-a="rparen">)</button>
        <div class="kgap"></div>
        <button class="k kn" data-v="0">0</button>
        <button class="k kn" data-v=".">.</button>
        <button class="k kd" data-a="left"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="9,2 4,7 9,12" stroke="#555" stroke-width="1.8" stroke-linecap="round"/></svg></button>
        <button class="k kd" data-a="right"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="5,2 10,7 5,12" stroke="#555" stroke-width="1.8" stroke-linecap="round"/></svg></button>
        <button class="k kd" data-a="enter"><svg width="20" height="14" viewBox="0 0 20 14" fill="none"><polyline points="14,2 14,8 3,8" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="6,5 3,8 6,11" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>

    <!-- f(x) keyboard -->
    <div id="mfx" style="display:none">
      <div class="kr">

<script>
// ═══════════════════════════════════════════════════════
// EXPRESSION MODEL
// An expression is a list of "nodes". Each node is one of:
//   {t:'text', v:'string'}            — plain characters
//   {t:'sup', base:nodes, exp:nodes}  — base^exponent  (cursor can be in exp)
//   {t:'sqrt', arg:nodes}             — √(arg)
//   {t:'frac', num:nodes, den:nodes}  — fraction
//   {t:'fn', name:'sin', arg:nodes}   — sin(...), cos(...) etc.
//   {t:'paren', inner:nodes}          — (...)
//
// Cursor = path through the tree: [{node, field, idx}, ...]
// field = which child list ('arg','exp','num','den','inner')
// idx = position within that list (between nodes, 0=before first)
//
// For simplicity we use a flat token list with structured tokens.
// ═══════════════════════════════════════════════════════

// We use a simpler approach: expression is an array of "atoms".
// Each atom:
//   {t:'ch', v:char}                          plain character
//   {t:'sup', exp:[atoms], done:bool}          superscript block
//   {t:'sqrt', arg:[atoms]}                    sqrt block
//   {t:'frac', num:[atoms], den:[atoms]}       fraction block
//   {t:'fn', name:'sin'}                       renders as sin(  with cursor inside

// Cursor position: {path:'root'|'sup'|'sqrt'|'frac-num'|'frac-den'|'fn-arg', 
//                   nodeIdx: index of the structural node in root atoms,
//                   pos: character position within active sub-list}

const S = {
  atoms: [],      // root level atoms
  cur: {          // cursor
    list: null,   // reference to active atom list (starts as S.atoms)
    pos: 0,       // index in that list (0=before first atom)
    inNode: null, // the parent structural node if we're inside one
    field: null   // 'exp','arg','num','den' if inside node
  },
  ans: 0,
  entries: [],
  dec: 2, dm: 'dez',
  exam: 0, t0: null, td: null, tiv: null
};

function initCur() {
  S.atoms = [];
  S.touched = false;
  S.cur = {list: S.atoms, pos: 0, inNode: null, field: null};
}
initCur();

// ── Cursor helpers ──
function curList() { return S.cur.list; }
function curPos() { return S.cur.pos; }

function insAtom(atom) {
  curList().splice(curPos(), 0, atom);
  S.cur.pos++;
}

function insChar(ch) { insAtom({t:'ch', v:ch}); }

function delAtom() {
  const l = curList(), p = curPos();
  if (p > 0) {
    l.splice(p-1, 1);
    S.cur.pos--;
    return true;
  }
  // try to exit containing node upward
  if (S.cur.inNode) {
    const node = S.cur.inNode;
    const field = S.cur.field;
    // if in exp of sup and empty, delete the whole sup
    if (node.t === 'sup' && field === 'exp' && node.exp.length === 0) {
      // find node in root
      exitNodeUpward();
      // delete it
      delAtom();
    } else if (node.t === 'frac' && field === 'num' && node.num.length === 0) {
      // jump to before frac
      exitNodeUpward();
    } else if (node.t === 'frac' && field === 'den') {
      // if den empty, go to num end
      S.cur.list = node.num;
      S.cur.pos = node.num.length;
      S.cur.field = 'num';
    } else if ((node.t === 'sqrt' || node.t === 'fn') && l.length === 0) {
      exitNodeUpward();
      delAtom();
    } else {
      exitNodeUpward();
    }
  }
}

function exitNodeUpward() {
  if (!S.cur.inNode) return;
  // find the node in root atoms
  const idx = S.atoms.indexOf(S.cur.inNode);
  if (idx >= 0) {
    S.cur.list = S.atoms;
    S.cur.pos = idx;
    S.cur.inNode = null;
    S.cur.field = null;
  }
}

function enterNodeField(node, field) {
  const list = node[field];
  S.cur.list = list;
  S.cur.pos = list.length; // put cursor at end
  S.cur.inNode = node;
  S.cur.field = field;
}

// Insert function like sin( with cursor INSIDE
function insFunction(name) {
  const node = {t:'fn', name:name, arg:[]};
  insAtom(node);
  enterNodeField(node, 'arg');
}

// Insert sqrt with cursor inside
function insSqrt() {
  const node = {t:'sqrt', arg:[]};
  insAtom(node);
  enterNodeField(node, 'arg');
}

// Insert □² (square: appends ^2 as text, but nicely rendered)
function insSq() {
  // If there's something before cursor, wrap it. Otherwise just insert literal.
  // Simpler: insert a sup node with exp='2', cursor after
  const node = {t:'sup', base:[], exp:[{t:'ch',v:'2'}]};
  // the "base" is implicit: it's the atom just before cursor
  // For simplicity: just insert ^2 marker
  insAtom({t:'ch',v:'^'});
  insAtom({t:'ch',v:'2'});
}

// Insert □ⁿ (pow: cursor goes into exponent)
function insPow() {
  const node = {t:'sup', exp:[]};
  insAtom(node);
  enterNodeField(node, 'exp');
}

// Insert □⁻¹
function insInv() {
  insAtom({t:'ch',v:'^'});
  insAtom({t:'ch',v:'('});
  insAtom({t:'ch',v:'-'});
  insAtom({t:'ch',v:'1'});
  insAtom({t:'ch',v:')'});
}

// Insert fraction □/□
function insFrac() {
  const node = {t:'frac', num:[], den:[]};
  insAtom(node);
  enterNodeField(node, 'num');
}

// ( auto-closing
function insLparen() {
  insAtom({t:'ch',v:'('});
}
function insRparen() {
  insAtom({t:'ch',v:')'});
}

// Move left
function moveLeft() {
  if (S.cur.pos > 0) {
    S.cur.pos--;
    // if we just moved before a structural node, enter it at end
    const atom = curList()[S.cur.pos];
    if (atom && (atom.t==='frac'||atom.t==='sup'||atom.t==='sqrt'||atom.t==='fn')) {
      // enter the last field of the node
      if (atom.t==='frac') {
        S.cur.inNode=atom; S.cur.field='den'; S.cur.list=atom.den; S.cur.pos=atom.den.length;
      } else if (atom.t==='sup') {
        S.cur.inNode=atom; S.cur.field='exp'; S.cur.list=atom.exp; S.cur.pos=atom.exp.length;
      } else if (atom.t==='sqrt'||atom.t==='fn') {
        S.cur.inNode=atom; S.cur.field='arg'; S.cur.list=atom.arg; S.cur.pos=atom.arg.length;
      }
    }
  } else if (S.cur.inNode) {
    const node = S.cur.inNode;
    if (node.t==='frac' && S.cur.field==='den') {
      // go to num end
      S.cur.list=node.num; S.cur.pos=node.num.length; S.cur.field='num';
    } else {
      exitNodeUpward();
    }
  }
}

// Move right
function moveRight() {
  const l = curList();
  if (S.cur.pos < l.length) {
    const atom = l[S.cur.pos];
    // if about to pass a structural node, enter it
    if (atom && (atom.t==='frac'||atom.t==='sup'||atom.t==='sqrt'||atom.t==='fn')) {
      S.cur.pos++;
      // enter first field
      if (atom.t==='frac') {
        S.cur.inNode=atom; S.cur.field='num'; S.cur.list=atom.num; S.cur.pos=0;
      } else if (atom.t==='sup') {
        S.cur.inNode=atom; S.cur.field='exp'; S.cur.list=atom.exp; S.cur.pos=0;
      } else if (atom.t==='sqrt'||atom.t==='fn') {
        S.cur.inNode=atom; S.cur.field='arg'; S.cur.list=atom.arg; S.cur.pos=0;
      }
    } else {
      S.cur.pos++;
    }
  } else if (S.cur.inNode) {
    const node = S.cur.inNode;
    if (node.t==='frac' && S.cur.field==='num') {
      S.cur.list=node.den; S.cur.pos=0; S.cur.field='den';
    } else {
      exitNodeUpward();
      S.cur.pos++; // move past the node
    }
  }
}

// ── RENDER ──
// Build HTML for a list of atoms + cursor position
function renderAtoms(atoms, curList, curPos, depth=0) {
  let html = '';
  for (let i = 0; i <= atoms.length; i++) {
    // cursor?
    if (atoms === curList && i === curPos) {
      html += '<span class="cur"></span>';
    }
    if (i === atoms.length) break;
    const a = atoms[i];
    if (a.t === 'ch') {
      // render special chars
      let v = a.v;
      if (v==='*') v='×';
      html += escH(v);
    } else if (a.t === 'sup') {
      // base is implicit (previous content), we just show ^[exp]
      const expHtml = renderAtoms(a.exp, curList, curPos, depth+1);
      const isActive = S.cur.inNode===a;
      html += `<span style="display:inline-flex;align-items:flex-start;vertical-align:baseline;"><span class="er-sup-exp${isActive?' editing':''}" style="font-size:0.62em;vertical-align:super;${isActive?'background:#E3F2FD;border-radius:3px;padding:0 2px;min-width:8px;':''}">${expHtml}</span></span>`;
    } else if (a.t === 'sqrt') {
      const argHtml = renderAtoms(a.arg, curList, curPos, depth+1);
      html += `<span style="display:inline-flex;align-items:center;vertical-align:middle;">` +
        `<svg width="16" height="18" viewBox="0 0 16 18" fill="none" style="flex-shrink:0"><polyline points="0,10 3,10 6,16 9,2" stroke="#333" stroke-width="1.5" stroke-linejoin="round" fill="none" stroke-linecap="round"/><line x1="9" y1="2" x2="16" y2="2" stroke="#333" stroke-width="1.5"/></svg>` +
        `<span style="border-top:1.5px solid #333;padding:0 3px;min-width:10px;">${argHtml||'<span style="color:#ccc">□</span>'}</span></span>`;
    } else if (a.t === 'frac') {
      const numHtml = renderAtoms(a.num, curList, curPos, depth+1);
      const denHtml = renderAtoms(a.den, curList, curPos, depth+1);
      const numAct = S.cur.inNode===a && S.cur.field==='num';
      const denAct = S.cur.inNode===a && S.cur.field==='den';
      html += `<span class="er-frac"><span class="fnum${numAct?' act':''}">${numHtml||'<span style="color:#ccc">□</span>'}</span><span class="fden${denAct?' act':''}">${denHtml||'<span style="color:#ccc">□</span>'}</span></span>`;
    } else if (a.t === 'fn') {
      const argHtml = renderAtoms(a.arg, curList, curPos, depth+1);
      html += `${escH(a.name)}(<span>${argHtml}</span>)`;
    }
  }
  return html;
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function rI() {
  const el = document.getElementById('expr-line');
  const html = renderAtoms(S.atoms, S.cur.list, S.cur.pos);
  el.innerHTML = html;

  // placeholder: show next to 1) only when completely empty and not yet touched
  const ph = document.getElementById('cn-ph');
  if (ph) ph.style.display = (S.atoms.length === 0 && !S.touched) ? 'block' : 'none';

  document.getElementById('cn').textContent = (S.entries.length+1)+')';

  // preview
  const expr = buildExpr(S.atoms);
  const pv = document.getElementById('cprev');
  if (expr.trim()) {
    const r = calcExpr(expr);
    if (r !== null && !isNaN(r) && isFinite(r)) {
      pv.textContent = '= ' + fmt(r);
    } else if (r === Infinity || r === -Infinity) {
      pv.textContent = '= ' + (r > 0 ? '∞' : '-∞');
    } else {
      pv.textContent = '';
    }
  } else {
    pv.textContent = '';
  }

  const last = S.entries[S.entries.length-1];
  document.getElementById('cvtb').classList.toggle('v', !!(last && last.frac));
}

// ── Build math expression string from atoms ──
function buildExpr(atoms) {
  return atoms.map(a => {
    if (a.t === 'ch') return a.v;
    if (a.t === 'sup') return '^(' + buildExpr(a.exp) + ')';
    if (a.t === 'sqrt') return 'sqrt(' + buildExpr(a.arg) + ')';
    if (a.t === 'frac') {
      const n = buildExpr(a.num) || '0';
      const d = buildExpr(a.den) || '1';
      return '(' + n + ')/(' + d + ')';
    }
    if (a.t === 'fn') return a.name + '(' + buildExpr(a.arg) + ')';
    return '';
  }).join('');
}

// Build display string for history (compact text)
function buildDisp(atoms) {
  return atoms.map(a => {
    if (a.t === 'ch') return a.v;
    if (a.t === 'sup') return '^(' + buildDisp(a.exp) + ')';
    if (a.t === 'sqrt') return '√(' + buildDisp(a.arg) + ')';
    if (a.t === 'frac') return '(' + buildDisp(a.num) + ')/(' + buildDisp(a.den) + ')';
    if (a.t === 'fn') return a.name + '(' + buildDisp(a.arg) + ')';
    return '';
  }).join('');
}

// Build HTML for history entry expression
function buildHistHTML(atoms) {
  return atoms.map(a => {
    if (a.t === 'ch') {
      const v = a.v;
      return escH(v==='*'?'×':v);
    }
    if (a.t === 'sup') {
      return `<sup style="font-size:0.65em">${buildHistHTML(a.exp)}</sup>`;
    }
    if (a.t === 'sqrt') {
      const inner = buildHistHTML(a.arg);
      return `<span class="hsqrt"><svg width="14" height="16" viewBox="0 0 14 16" fill="none" style="flex-shrink:0"><polyline points="0,9 2.5,9 5,14 8,2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><line x1="8" y1="2" x2="14" y2="2" stroke="currentColor" stroke-width="1.4"/></svg><span class="rad">${inner}</span></span>`;
    }
    if (a.t === 'frac') {
      const n = buildHistHTML(a.num);
      const d = buildHistHTML(a.den);
      return `<span class="hfrac"><span class="fn">${n}</span><span class="fd">${d}</span></span>`;
    }
    if (a.t === 'fn') {
      return `${escH(a.name)}(${buildHistHTML(a.arg)})`;
    }
    return '';
  }).join('');
}

// ── MATH ──
function gcd(a,b){a=Math.abs(Math.round(a));b=Math.abs(Math.round(b));while(b){const t=b;b=a%b;a=t;}return a||1;}
function toFrac(v){
  if(!isFinite(v)||v===Math.round(v))return null;
  const sg=v<0?-1:1; v=Math.abs(v);
  for(let d=1;d<=9999;d++){const n=Math.round(v*d);if(Math.abs(v-n/d)<1e-10){const g=gcd(n,d);return{n:sg*n/g,d:d/g};}}
  return null;
}
function fmt(v){
  if(!isFinite(v))return v>0?'∞':'-∞';
  return S.dm==='sig'?parseFloat(v.toPrecision(S.dec)).toString():parseFloat(v.toFixed(S.dec)).toString();
}

function calcExpr(e) {
  if (!e || !e.trim()) return null;
  const D = Math.PI/180;
  const fns = {
    sin: x=>Math.sin(x*D), cos: x=>Math.cos(x*D), tan: x=>Math.tan(x*D),
    asin: x=>Math.asin(x)/D, acos: x=>Math.acos(x)/D, atan: x=>Math.atan(x)/D,
    ln: x=>Math.log(x), log: x=>Math.log10(x),
    sqrt: x=>Math.sqrt(x), abs: x=>Math.abs(x), exp: x=>Math.exp(x),
  };
  // normalize expression
  let j = e
    .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
    .replace(/π/g,'Math.PI').replace(/ANS/g, S.ans)
    .replace(/\^/g,'**');
  // replace function names
  for (const [name, fn] of Object.entries(fns)) {
    j = j.replace(new RegExp(name+'\\(', 'g'), `__${name}(`);
  }
  try {
    const fnArgs = Object.keys(fns).map(n=>`__${n}`).join(',');
    const fnVals = Object.values(fns);
    return Function(...Object.keys(fns).map(n=>`__${n}`), `"use strict";return(${j})`)(...fnVals);
  } catch(e2) {
    return NaN;
  }
}

// ── SUBMIT ──
function submit() {
  // exit any open node
  if (S.cur.inNode) {
    const idx = S.atoms.indexOf(S.cur.inNode);
    if (idx >= 0) {
      S.cur.list = S.atoms;
      S.cur.pos = idx + 1;
      S.cur.inNode = null;
      S.cur.field = null;
    }
  }
  if (S.atoms.length === 0) return;
  const expr = buildExpr(S.atoms);
  const r = calcExpr(expr);
  const frac = (r !== null && !isNaN(r) && r !== Math.round(r)) ? toFrac(r) : null;
  const atomsSnap = JSON.parse(JSON.stringify(S.atoms));
  S.entries.push({atoms: atomsSnap, res: r, frac, sf: false});
  if (r !== null && !isNaN(r) && isFinite(r)) S.ans = r;
  initCur();
  rH(); rI();
}

// ── HISTORY ──
function rH() {
  const el = document.getElementById('hist'); el.innerHTML = '';
  // entries in order: oldest at top, newest at bottom
  S.entries.forEach((e,i) => {
    const d = document.createElement('div'); d.className = 'ent';
    const nm = document.createElement('div'); nm.className = 'en'; nm.textContent = (i+1)+')';
    const ex = document.createElement('div'); ex.className = 'ee';
    ex.innerHTML = buildHistHTML(e.atoms);
    d.append(nm, ex);
    if (e.res !== null && e.res !== undefined) {
      const re = document.createElement('div'); re.className = 'er';
      const eq = document.createElement('span'); eq.className = 'ereq'; eq.textContent = '= ';
      re.appendChild(eq);
      if (isNaN(e.res)) {
        re.appendChild(document.createTextNode('undefiniert'));
      } else if (!isFinite(e.res)) {
        re.appendChild(document.createTextNode(e.res > 0 ? '∞' : '-∞'));
      } else if (e.sf && e.frac) {
        const f = document.createElement('span'); f.className = 'hfrac';
        f.innerHTML = `<span class="fn">${e.frac.n}</span><span class="fd">${e.frac.d}</span>`;
        re.appendChild(f);
      } else {
        re.appendChild(document.createTextNode(fmt(e.res)));
      }
      d.appendChild(re);
    }
    el.appendChild(d);
  });
  el.scrollTop = el.scrollHeight;
}

// ── KEY HANDLER ──
function ka(btn) {
  const a = btn.dataset.a, v = btn.dataset.v;
  if (a === 'noop') return;
  S.touched = true; // hide placeholder immediately on first press
  if (v !== undefined) { insChar(v); rI(); return; }
  switch(a) {
    case 'del': delAtom(); break;
    case 'enter': submit(); return;
    case 'ans': insChar('A'); insChar('N'); insChar('S'); break;
    case 'left': moveLeft(); break;
    case 'right': moveRight(); break;
    case 'sin': insFunction('sin'); break;
    case 'cos': insFunction('cos'); break;
    case 'tan': insFunction('tan'); break;
    case 'asin': insFunction('asin'); break;
    case 'acos': insFunction('acos'); break;
    case 'atan': insFunction('atan'); break;
    case 'ln': insFunction('ln'); break;
    case 'log': insFunction('log'); break;
    case 'sqrt': insSqrt(); break;
    case 'sq': insSq(); break;
    case 'pow': insPow(); break;
    case 'inv': insInv(); break;
    case 'exp': insFunction('exp'); break;
    case 'frac': insFrac(); break;
    case 'lparen': insLparen(); break;
    case 'rparen': insRparen(); break;
  }
  rI();
}

document.querySelectorAll('.k').forEach(k => {
  k.addEventListener('click', () => ka(k));
  // hold to delete
  if (k.dataset.a === 'del') {
    let holdTimer = null;
    let holdInterval = null;
    const startHold = () => {
      holdTimer = setTimeout(() => {
        holdInterval = setInterval(() => { delAtom(); rI(); }, 80);
      }, 400);
    };
    const stopHold = () => {
      clearTimeout(holdTimer);
      clearInterval(holdInterval);
      holdTimer = null; holdInterval = null;
    };
    k.addEventListener('mousedown', startHold);
    k.addEventListener('touchstart', startHold, {passive:true});
    k.addEventListener('mouseup', stopHold);
    k.addEventListener('mouseleave', stopHold);
    k.addEventListener('touchend', stopHold);
    k.addEventListener('touchcancel', stopHold);
  }
});
document.getElementById('cvtb').addEventListener('click', () => {

});

// exam
function p2(n){return String(n).padStart(2,'0');}
function fms(ms){const s=Math.floor(ms/1000);return p2(Math.floor(s/60))+':'+p2(s%60);}
function fhms(d){return p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());}
function fdate(d){const M=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];return d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();}
function examFn(){
  if(S.exam===0){S.exam=1;S.t0=Date.now();S.td=new Date();const tm=document.getElementById('htimer');tm.style.display='block';tm.textContent='00:00';S.tiv=setInterval(()=>{document.getElementById('htimer').textContent=fms(Date.now()-S.t0);},500);}
  else if(S.exam===1){S.exam=2;clearInterval(S.tiv);const en=new Date();document.getElementById('exd').textContent=fms(en-S.td);document.getElementById('exdt').textContent=fdate(S.td);document.getElementById('exb').textContent=fhms(S.td);document.getElementById('exe').textContent=fhms(en);document.getElementById('exam').classList.add('on');}
}
document.getElementById('eeb').addEventListener('click',()=>{document.getElementById('exam').classList.remove('on');document.getElementById('htimer').style.display='none';S.exam=0;});
document.querySelectorAll('.sbb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.sbb').forEach(x=>x.classList.remove('on'));b.classList.add('on');}));
